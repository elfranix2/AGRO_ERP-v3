name: GENERER_MON_APK
on: [push]
jobs:
  android-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.0 # On installe directement la version 8.0 ici

      - name: Fabrication de l'APK
        run: gradle assembleDebug # On lance la fabrication directement

      - name: Telechargement de l'APK
        uses: actions/upload-artifact@v4
        with:
          name: AGRO-ERP-V2-INSTALLABLE
          path: app/build/outputs/apk/debug/app-debug.apk
